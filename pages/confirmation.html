<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Order confirmed — Dragon-Tech">
  <title>Order Confirmed | Dragon-Tech</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Orbitron:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../css/main.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; padding:20px; }

    .conf-page {
      position: relative; z-index: 2;
      width: 100%; max-width: 620px;
      text-align: center;
    }

    /* Success Animation */
    .success-ring {
      width: 100px; height: 100px;
      border-radius: 50%;
      border: 3px solid var(--accent);
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 28px;
      position: relative;
      box-shadow: 0 0 40px rgba(0,168,255,0.3), inset 0 0 20px rgba(0,168,255,0.05);
      animation: ringPulse 2s ease-in-out infinite;
    }

    @keyframes ringPulse {
      0%,100% { box-shadow: 0 0 30px rgba(0,168,255,0.3); }
      50%      { box-shadow: 0 0 60px rgba(0,168,255,0.5), 0 0 100px rgba(0,168,255,0.15); }
    }

    .success-check {
      font-size: 2.5rem;
      color: var(--accent);
      animation: checkPop 0.5s var(--t-spring) 0.2s both;
    }

    @keyframes checkPop {
      from { transform: scale(0); opacity: 0; }
      to   { transform: scale(1); opacity: 1; }
    }

    .conf-title {
      font-family: var(--font-display);
      font-size: 2rem; font-weight: 800;
      color: var(--text-primary);
      margin-bottom: 10px;
      animation: fadeUp 0.6s var(--t-base) 0.3s both;
    }

    .conf-subtitle {
      color: var(--text-secondary);
      font-size: 1rem;
      margin-bottom: 32px;
      animation: fadeUp 0.6s var(--t-base) 0.4s both;
    }

    /* Order Box */
    .order-box {
      background: var(--bg-elevated);
      border: 1px solid var(--border-default);
      border-radius: var(--radius-xl);
      overflow: hidden;
      margin-bottom: 24px;
      animation: fadeUp 0.6s var(--t-base) 0.5s both;
      text-align: left;
    }

    .order-box-head {
      padding: 20px 24px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
      display: flex; justify-content: space-between; align-items: center;
      flex-wrap: wrap; gap: 10px;
    }

    .order-box-id { font-family: var(--font-mono, monospace); font-size: 0.78rem; color: var(--text-muted); }
    .order-box-status { }

    .order-items-list { padding: 16px 24px; }

    .conf-item {
      display: flex; align-items: center; gap: 14px;
      padding: 12px 0;
      border-bottom: 1px solid var(--border-subtle);
    }
    .conf-item:last-child { border-bottom: none; }

    .conf-item-img {
      width: 54px; height: 54px;
      background: var(--bg-surface);
      border-radius: var(--radius-md);
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0; overflow: hidden;
    }
    .conf-item-img img { width: 100%; height: 100%; object-fit: contain; padding: 6px; }

    .conf-item-name { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); margin-bottom: 2px; }
    .conf-item-meta { font-size: 0.78rem; color: var(--text-muted); }
    .conf-item-price { margin-left: auto; font-weight: 700; color: var(--accent); font-size: 0.9rem; }

    /* Totals */
    .order-totals {
      padding: 16px 24px;
      background: var(--bg-surface);
      border-top: 1px solid var(--border-subtle);
    }

    .total-row {
      display: flex; justify-content: space-between;
      font-size: 0.875rem; margin-bottom: 8px;
      color: var(--text-secondary);
    }

    .total-row.grand {
      font-size: 1.05rem; font-weight: 700;
      color: var(--text-primary);
      padding-top: 10px;
      border-top: 1px solid var(--border-subtle);
      margin-top: 4px;
    }

    .total-row.grand .total-val { color: var(--accent); font-family: var(--font-display); }

    /* Delivery banner */
    .delivery-banner {
      display: flex; align-items: center; gap: 14px;
      padding: 16px 20px;
      background: rgba(0,168,255,0.06);
      border: 1px solid rgba(0,168,255,0.15);
      border-radius: var(--radius-lg);
      margin-bottom: 24px;
      animation: fadeUp 0.6s var(--t-base) 0.6s both;
      text-align: left;
    }

    .delivery-icon { font-size: 1.8rem; flex-shrink: 0; }
    .delivery-text-title { font-size: 0.9rem; font-weight: 600; color: var(--text-primary); }
    .delivery-text-sub { font-size: 0.8rem; color: var(--text-muted); }

    /* Actions */
    .conf-actions {
      display: flex; gap: 12px; justify-content: center; flex-wrap: wrap;
      animation: fadeUp 0.6s var(--t-base) 0.7s both;
    }

    /* Fireworks canvas */
    #fwCanvas {
      position: fixed; inset: 0;
      pointer-events: none; z-index: 1;
    }
  </style>
</head>
<body>

  <canvas id="psCanvas"></canvas>
  <canvas id="fwCanvas"></canvas>
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <div class="toast-stack" id="toastStack" role="region" aria-live="polite"></div>

  <div class="conf-page">

    <!-- Success Icon -->
    <div class="success-ring">
      <div class="success-check">✓</div>
    </div>

    <h1 class="conf-title">Order Confirmed!</h1>
    <p class="conf-subtitle" id="confSubtitle">Thank you for your order. We're processing it right now.</p>

    <!-- Order Box -->
    <div class="order-box" id="orderBox">
      <div class="order-box-head">
        <div>
          <div style="font-size:0.72rem;letter-spacing:1px;text-transform:uppercase;color:var(--text-muted);font-weight:600;margin-bottom:4px;">Order ID</div>
          <div class="order-box-id" id="orderId">Loading…</div>
        </div>
        <span class="status-badge status-processing" id="orderStatus">Processing</span>
      </div>
      <div class="order-items-list" id="orderItems">
        <p style="color:var(--text-muted);font-size:0.85rem;">Loading order details…</p>
      </div>
      <div class="order-totals" id="orderTotals"></div>
    </div>

    <!-- Delivery -->
    <div class="delivery-banner">
      <div class="delivery-icon">🚚</div>
      <div>
        <div class="delivery-text-title">Estimated Delivery</div>
        <div class="delivery-text-sub" id="deliveryEst">Within 3–5 business days</div>
      </div>
    </div>

    <!-- Actions -->
    <div class="conf-actions">
      <a href="dashboard.html" class="btn btn-primary">View My Orders</a>
      <a href="../index.html" class="btn btn-outline">Continue Shopping</a>
    </div>
  </div>

  <script src="../js/utils.js"></script>
  <script src="../js/storage-service.js"></script>
  <script src="../js/currency.js"></script>
  <script src="../js/products.js"></script>

  <script>
  (function () {
    // Theme
    var saved = localStorage.getItem('dragon_theme') || 'dark';
    document.documentElement.setAttribute('data-theme', saved);

    function fmt(v) { return window.currency ? window.currency.formatPrice(v) : '$' + v.toFixed(2); }
    function fmtDate(ts) { return new Date(ts).toLocaleDateString('en-US', { weekday:'long', year:'numeric', month:'long', day:'numeric' }); }

    // Get order ID from URL
    var params = new URLSearchParams(window.location.search);
    var orderId = params.get('id');

    if (!orderId || !window.storage) {
      document.getElementById('confSubtitle').textContent = 'Your order was placed successfully.';
      return;
    }

    var order = window.storage.getOrderById(orderId);
    if (!order) {
      document.getElementById('confSubtitle').textContent = 'Order details could not be found.';
      return;
    }

    // Populate
    document.getElementById('orderId').textContent = '#' + order.id;
    document.getElementById('confSubtitle').textContent =
      'Hi ' + (order.userName || 'there') + '! Your order has been placed successfully.';

    var status = order.status || 'processing';
    var statusEl = document.getElementById('orderStatus');
    if (statusEl) { statusEl.textContent = status; statusEl.className = 'status-badge status-' + status; }

    // Items
    var itemsEl = document.getElementById('orderItems');
    if (itemsEl && order.items) {
      itemsEl.innerHTML = order.items.map(function(it) {
        return '<div class="conf-item">' +
          '<div class="conf-item-img"><img src="../' + (it.image||'assets/product-earbuds.svg') + '" alt="' + (it.name||'') + '"></div>' +
          '<div><div class="conf-item-name">' + (it.name||'Product') + '</div>' +
          '<div class="conf-item-meta">Qty: ' + it.qty + '</div></div>' +
          '<div class="conf-item-price">' + fmt((it.price||0) * it.qty) + '</div>' +
        '</div>';
      }).join('');
    }

    // Totals
    var totalsEl = document.getElementById('orderTotals');
    if (totalsEl) {
      var rows = '';
      rows += '<div class="total-row"><span>Subtotal</span><span>' + fmt(order.subtotal || order.total) + '</span></div>';
      if (order.discount > 0) {
        rows += '<div class="total-row"><span>Discount (' + (order.discountCode||'') + ')</span><span style="color:#00c97b;">−' + fmt(order.discount) + '</span></div>';
      }
      rows += '<div class="total-row"><span>Shipping</span><span>' + (order.shipping === 0 ? 'Free' : fmt(order.shipping||4.99)) + '</span></div>';
      rows += '<div class="total-row grand"><span>Total Paid</span><span class="total-val">' + fmt(order.total) + '</span></div>';
      totalsEl.innerHTML = rows;
    }

    // Delivery date
    var delivEl = document.getElementById('deliveryEst');
    if (delivEl && order.deliveryEst) {
      delivEl.textContent = 'By ' + fmtDate(order.deliveryEst);
    }

    // ---- Fireworks ----
    (function () {
      var c = document.getElementById('fwCanvas');
      if (!c) return;
      var ctx = c.getContext('2d');
      c.width = window.innerWidth; c.height = window.innerHeight;
      window.addEventListener('resize', function () { c.width = window.innerWidth; c.height = window.innerHeight; });

      var particles = [];
      var COLORS = ['#00a8ff','#7b2fff','#00ffd4','#ff0080','#fbbf24','#ffffff'];

      function burst(x, y) {
        for (var i = 0; i < 60; i++) {
          var angle = (Math.PI * 2) * (i / 60);
          var speed = Math.random() * 6 + 2;
          particles.push({
            x: x, y: y,
            vx: Math.cos(angle) * speed,
            vy: Math.sin(angle) * speed - Math.random() * 3,
            alpha: 1,
            color: COLORS[Math.floor(Math.random() * COLORS.length)],
            size: Math.random() * 4 + 1,
            decay: Math.random() * 0.02 + 0.01
          });
        }
      }

      // Fire 3 bursts
      var w = c.width, h = c.height;
      setTimeout(function () { burst(w * 0.25, h * 0.35); }, 200);
      setTimeout(function () { burst(w * 0.75, h * 0.3); }, 400);
      setTimeout(function () { burst(w * 0.5, h * 0.25); }, 600);

      function animFW() {
        ctx.fillStyle = 'rgba(0,0,0,0.15)';
        ctx.fillRect(0, 0, c.width, c.height);
        particles = particles.filter(function (p) { return p.alpha > 0; });
        particles.forEach(function (p) {
          p.x += p.vx; p.y += p.vy;
          p.vy += 0.12; // gravity
          p.alpha -= p.decay;
          ctx.globalAlpha = Math.max(0, p.alpha);
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size, 0, Math.PI * 2);
          ctx.fillStyle = p.color;
          ctx.fill();
        });
        ctx.globalAlpha = 1;
        if (particles.length > 0) requestAnimationFrame(animFW);
        else ctx.clearRect(0, 0, c.width, c.height);
      }
      animFW();
    })();

  })();
  </script>
</body>
</html>
