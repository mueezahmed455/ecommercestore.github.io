<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgSsd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="purpleSsd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <linearGradient id="metalSsd" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3a3a4e"/>
      <stop offset="50%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <filter id="glowSsd">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadowSsd" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgSsd)" rx="16"/>
  <ellipse cx="200" cy="270" rx="80" ry="12" fill="url(#shadowSsd)"/>
  <g filter="url(#glowSsd)">
    <!-- SSD body - angled slightly for perspective -->
    <rect x="130" y="150" width="140" height="90" rx="8" fill="url(#metalSsd)" stroke="url(#purpleSsd)" stroke-width="2"/>
    <!-- Metal texture lines -->
    <line x1="140" y1="160" x2="260" y2="160" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="170" x2="260" y2="170" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="180" x2="260" y2="180" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="190" x2="260" y2="190" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="200" x2="260" y2="200" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="210" x2="260" y2="210" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <line x1="140" y1="220" x2="260" y2="220" stroke="#444" stroke-width="0.5" opacity="0.3"/>
    <!-- Center label area -->
    <rect x="155" y="165" width="90" height="50" rx="4" fill="#1a1a2e" opacity="0.6"/>
    <!-- Capacity text placeholder -->
    <rect x="175" y="175" width="50" height="6" rx="3" fill="url(#purpleSsd)" opacity="0.5"/>
    <!-- Speed indicator bars -->
    <rect x="165" y="190" width="25" height="3" rx="1.5" fill="#a855f7" opacity="0.4"/>
    <rect x="195" y="190" width="40" height="3" rx="1.5" fill="#ec4899" opacity="0.4">
      <animate attributeName="width" values="40;60;40" dur="2s" repeatCount="indefinite"/>
    </rect>
    <rect x="165" y="198" width="55" height="3" rx="1.5" fill="#a855f7" opacity="0.3"/>
    <!-- Brand logo area -->
    <rect x="230" y="165" width="12" height="12" rx="2" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.5"/>
    <circle cx="236" cy="171" r="3" fill="#a855f7" opacity="0.3"/>
    <!-- Activity LED -->
    <circle cx="255" cy="225" r="3" fill="#a855f7">
      <animate attributeName="opacity" values="1;0.1;0.8;0.1;1;0.3;1" dur="2.5s" repeatCount="indefinite"/>
    </circle>
    <!-- USB-C port -->
    <rect x="266" y="185" width="8" height="20" rx="4" fill="#0a0a15" stroke="#555" stroke-width="1"/>
    <rect x="269" y="190" width="5" height="10" rx="2.5" fill="#1a1a2e"/>
    <!-- Corner screws -->
    <circle cx="138" cy="158" r="2.5" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
    <circle cx="262" cy="158" r="2.5" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
    <circle cx="138" cy="232" r="2.5" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
    <circle cx="262" cy="232" r="2.5" fill="#1a1a2e" stroke="#555" stroke-width="0.5"/>
    <!-- Edge highlight -->
    <path d="M138 158 L262 158" fill="none" stroke="white" stroke-width="0.5" opacity="0.1"/>
  </g>
  <!-- Data transfer particles -->
  <circle cx="290" cy="195" r="2" fill="#a855f7" opacity="0.5">
    <animate attributeName="cx" values="275;300" dur="1.5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0;0.6;0" dur="1.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="195" r="1.5" fill="#ec4899" opacity="0.4">
    <animate attributeName="cx" values="280;310" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    <animate attributeName="opacity" values="0;0.5;0" dur="2s" repeatCount="indefinite" begin="0.5s"/>
  </circle>
  <!-- Floating particles -->
  <circle cx="100" cy="140" r="2" fill="#a855f7" opacity="0.4">
    <animate attributeName="cy" values="140;125;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="160" r="1.5" fill="#ec4899" opacity="0.3">
    <animate attributeName="cy" values="160;145;160" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="110" r="1" fill="#a855f7" opacity="0.3">
    <animate attributeName="cy" values="110;98;110" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
