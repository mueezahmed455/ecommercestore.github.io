<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="pink8" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ec4899"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow8">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow8" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#ec4899;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg8)" rx="16"/>
  <ellipse cx="200" cy="310" rx="55" ry="12" fill="url(#shadow8)"/>
  <!-- Fitness tracker band -->
  <g filter="url(#glow8)">
    <!-- Band top -->
    <path d="M165 100 Q155 130 160 160 L240 160 Q245 130 235 100 Z" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <!-- Band bottom -->
    <path d="M155 230 L150 300 Q150 310 160 310 L240 310 Q250 310 250 300 L245 230 Z" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <!-- Screen -->
    <rect x="158" y="158" width="84" height="74" rx="10" fill="#0f0f1a" stroke="url(#pink8)" stroke-width="2"/>
    <!-- Heart rate display -->
    <text x="200" y="180" text-anchor="middle" fill="#666" font-size="9" font-family="sans-serif">BPM</text>
    <text x="200" y="200" text-anchor="middle" fill="#ec4899" font-size="22" font-weight="bold" font-family="sans-serif">72</text>
    <!-- Heartbeat line -->
    <polyline points="168,215 178,215 184,205 190,225 196,210 202,220 208,215 218,215 228,215"
      fill="none" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1s" repeatCount="indefinite"/>
    </polyline>
  </g>
  <!-- Floating particles -->
  <circle cx="120" cy="130" r="2" fill="#ec4899" opacity="0.4">
    <animate attributeName="cy" values="130;118;130" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="170" r="1.5" fill="#a855f7" opacity="0.3">
    <animate attributeName="cy" values="170;155;170" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="90" r="1" fill="#ec4899" opacity="0.3">
    <animate attributeName="cy" values="90;78;90" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>