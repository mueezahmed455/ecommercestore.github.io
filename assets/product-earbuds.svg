<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="neon1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#a855f7"/>
    </linearGradient>
    <filter id="glow1">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow1" cx="50%" cy="70%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.3"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg1)" rx="16"/>
  <circle cx="200" cy="320" r="80" fill="url(#shadow1)"/>
  <!-- Left earbud -->
  <g filter="url(#glow1)">
    <ellipse cx="160" cy="190" rx="35" ry="40" fill="#1e1e2e" stroke="url(#neon1)" stroke-width="2"/>
    <ellipse cx="160" cy="185" rx="20" ry="22" fill="#2a2a3e"/>
    <circle cx="160" cy="180" r="8" fill="#00d4ff" opacity="0.8"/>
    <ellipse cx="160" cy="190" rx="35" ry="40" fill="none" stroke="#00d4ff" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Right earbud -->
  <g filter="url(#glow1)">
    <ellipse cx="240" cy="190" rx="35" ry="40" fill="#1e1e2e" stroke="url(#neon1)" stroke-width="2"/>
    <ellipse cx="240" cy="185" rx="20" ry="22" fill="#2a2a3e"/>
    <circle cx="240" cy="180" r="8" fill="#a855f7" opacity="0.8"/>
    <ellipse cx="240" cy="190" rx="35" ry="40" fill="none" stroke="#a855f7" stroke-width="0.5" opacity="0.3"/>
  </g>
  <!-- Charging case hint -->
  <rect x="145" y="240" width="110" height="30" rx="15" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  <circle cx="200" cy="255" r="4" fill="#00d4ff" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </circle>
  <!-- Floating particles -->
  <circle cx="120" cy="140" r="2" fill="#00d4ff" opacity="0.5">
    <animate attributeName="cy" values="140;130;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="280" cy="160" r="1.5" fill="#a855f7" opacity="0.4">
    <animate attributeName="cy" values="160;145;160" dur="2.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="180" cy="120" r="1" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="120;108;120" dur="4s" repeatCount="indefinite"/>
  </circle>
</svg>