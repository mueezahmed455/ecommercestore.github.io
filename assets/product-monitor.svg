<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgMonitor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="screenMonitor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0520"/>
      <stop offset="50%" style="stop-color:#1a0a3e"/>
      <stop offset="100%" style="stop-color:#0a1628"/>
    </linearGradient>
    <linearGradient id="purpleMonitor" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#a855f7"/>
      <stop offset="100%" style="stop-color:#6366f1"/>
    </linearGradient>
    <linearGradient id="standMonitor" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1e1e2e"/>
    </linearGradient>
    <filter id="glowMonitor">
      <feGaussianBlur stdDeviation="5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadowMonitor" cx="50%" cy="80%">
      <stop offset="0%" style="stop-color:#a855f7;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#a855f7;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgMonitor)" rx="16"/>
  <ellipse cx="200" cy="340" rx="80" ry="10" fill="url(#shadowMonitor)"/>
  <g filter="url(#glowMonitor)">
    <!-- Stand base -->
    <ellipse cx="200" cy="310" rx="50" ry="8" fill="url(#standMonitor)" stroke="#444" stroke-width="1"/>
    <!-- Stand neck -->
    <path d="M190 270 L185 310 L215 310 L210 270 Z" fill="url(#standMonitor)" stroke="#444" stroke-width="1"/>
    <!-- Monitor bezel -->
    <rect x="100" y="110" width="200" height="130" rx="8" fill="#1a1a2e" stroke="url(#purpleMonitor)" stroke-width="2"/>
    <!-- Screen -->
    <rect x="108" y="118" width="184" height="114" rx="4" fill="url(#screenMonitor)"/>
    <!-- Screen content - gradient bars -->
    <rect x="120" y="135" width="80" height="4" rx="2" fill="#a855f7" opacity="0.6">
      <animate attributeName="width" values="80;120;80" dur="4s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="147" width="120" height="4" rx="2" fill="#6366f1" opacity="0.4"/>
    <rect x="120" y="159" width="60" height="4" rx="2" fill="#a855f7" opacity="0.5">
      <animate attributeName="width" values="60;100;60" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="171" width="140" height="4" rx="2" fill="#6366f1" opacity="0.3"/>
    <rect x="120" y="183" width="90" height="4" rx="2" fill="#a855f7" opacity="0.4"/>
    <rect x="120" y="195" width="70" height="4" rx="2" fill="#6366f1" opacity="0.5">
      <animate attributeName="width" values="70;110;70" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="120" y="207" width="100" height="4" rx="2" fill="#a855f7" opacity="0.3"/>
    <!-- Small graph area -->
    <rect x="220" y="135" width="55" height="60" rx="4" fill="#1a0a3e" stroke="#a855f7" stroke-width="0.5" opacity="0.5"/>
    <polyline points="225,185 235,170 245,175 255,155 265,160 270,145" fill="none" stroke="#a855f7" stroke-width="1.5" opacity="0.6"/>
    <!-- Camera dot -->
    <circle cx="200" cy="114" r="2" fill="#333"/>
    <!-- Bottom bezel accent -->
    <rect x="185" y="236" width="30" height="2" rx="1" fill="#a855f7" opacity="0.4"/>
    <!-- Screen glow overlay -->
    <rect x="108" y="118" width="184" height="114" rx="4" fill="none" stroke="#a855f7" stroke-width="1" opacity="0.3">
      <animate attributeName="opacity" values="0.15;0.4;0.15" dur="3s" repeatCount="indefinite"/>
    </rect>
  </g>
  <!-- Floating particles -->
  <circle cx="100" cy="90" r="2" fill="#a855f7" opacity="0.4">
    <animate attributeName="cy" values="90;75;90" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="130" r="1.5" fill="#6366f1" opacity="0.3">
    <animate attributeName="cy" values="130;115;130" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="260" cy="80" r="1" fill="#a855f7" opacity="0.3">
    <animate attributeName="cy" values="80;68;80" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
