<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgTablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="screenTablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a1628"/>
      <stop offset="100%" style="stop-color:#0f0520"/>
    </linearGradient>
    <linearGradient id="greenTablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <linearGradient id="bodyTablet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glowTablet">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadowTablet" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgTablet)" rx="16"/>
  <ellipse cx="200" cy="310" rx="90" ry="12" fill="url(#shadowTablet)"/>
  <g filter="url(#glowTablet)">
    <!-- Tablet body -->
    <rect x="120" y="100" width="160" height="210" rx="12" fill="url(#bodyTablet)" stroke="url(#greenTablet)" stroke-width="2"/>
    <!-- Tablet screen -->
    <rect x="128" y="110" width="144" height="188" rx="6" fill="url(#screenTablet)"/>
    <!-- Screen content - design app mockup -->
    <!-- Top bar -->
    <rect x="135" y="118" width="130" height="16" rx="3" fill="#1a1a2e" opacity="0.7"/>
    <circle cx="145" cy="126" r="3" fill="#22c55e" opacity="0.6"/>
    <rect x="153" y="124" width="40" height="4" rx="2" fill="#333"/>
    <!-- Content grid -->
    <rect x="135" y="142" width="60" height="40" rx="4" fill="#1a0a3e" stroke="#22c55e" stroke-width="0.5" opacity="0.5"/>
    <rect x="203" y="142" width="62" height="40" rx="4" fill="#0a1628" stroke="#00d4ff" stroke-width="0.5" opacity="0.5"/>
    <rect x="135" y="190" width="130" height="30" rx="4" fill="#1a1a2e" opacity="0.4"/>
    <!-- Content lines -->
    <rect x="142" y="198" width="50" height="3" rx="1.5" fill="#22c55e" opacity="0.5"/>
    <rect x="142" y="206" width="80" height="3" rx="1.5" fill="#00d4ff" opacity="0.3"/>
    <!-- Bottom section -->
    <rect x="135" y="228" width="40" height="25" rx="4" fill="#1a0a3e" stroke="#22c55e" stroke-width="0.5" opacity="0.4"/>
    <rect x="180" y="228" width="40" height="25" rx="4" fill="#0a1628" stroke="#00d4ff" stroke-width="0.5" opacity="0.4"/>
    <rect x="225" y="228" width="40" height="25" rx="4" fill="#1a0a3e" stroke="#a855f7" stroke-width="0.5" opacity="0.4"/>
    <!-- Home indicator -->
    <rect x="180" y="290" width="40" height="3" rx="1.5" fill="#555" opacity="0.4"/>
    <!-- Camera dot -->
    <circle cx="200" cy="105" r="2" fill="#333"/>
    <!-- Stylus -->
    <g transform="rotate(-15, 305, 180)">
      <rect x="295" y="120" width="10" height="130" rx="5" fill="#2a2a3e" stroke="#22c55e" stroke-width="1.5"/>
      <!-- Stylus tip -->
      <path d="M297 250 L300 265 L303 250 Z" fill="#444"/>
      <!-- Stylus button -->
      <rect x="301" y="155" width="4" height="12" rx="2" fill="#22c55e" opacity="0.6">
        <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
      </rect>
    </g>
  </g>
  <!-- Screen glow -->
  <rect x="128" y="110" width="144" height="188" rx="6" fill="none" stroke="#22c55e" stroke-width="0.5" opacity="0.2">
    <animate attributeName="opacity" values="0.1;0.35;0.1" dur="3s" repeatCount="indefinite"/>
  </rect>
  <!-- Floating particles -->
  <circle cx="100" cy="130" r="2" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="130;115;130" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="160" r="1.5" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="160;145;160" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="250" cy="85" r="1" fill="#22c55e" opacity="0.3">
    <animate attributeName="cy" values="85;73;85" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
