<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cyan7" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#06b6d4"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow7">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow7" cx="50%" cy="78%">
      <stop offset="0%" style="stop-color:#06b6d4;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg7)" rx="16"/>
  <ellipse cx="200" cy="310" rx="50" ry="10" fill="url(#shadow7)"/>
  <!-- Webcam body -->
  <g filter="url(#glow7)">
    <rect x="140" y="160" width="120" height="80" rx="12" fill="#1e1e2e" stroke="url(#cyan7)" stroke-width="2"/>
    <!-- Lens outer -->
    <circle cx="200" cy="200" r="30" fill="#0f0f1a" stroke="#333" stroke-width="1.5"/>
    <!-- Lens inner -->
    <circle cx="200" cy="200" r="22" fill="#0a0a15"/>
    <!-- Lens reflection -->
    <circle cx="192" cy="192" r="8" fill="#06b6d4" opacity="0.15"/>
    <!-- Lens dot -->
    <circle cx="200" cy="200" r="6" fill="#1a1a2e" stroke="#222" stroke-width="0.5"/>
    <circle cx="200" cy="200" r="3" fill="#06b6d4" opacity="0.5">
      <animate attributeName="opacity" values="0.3;0.7;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- Mic holes -->
    <circle cx="160" cy="200" r="2" fill="#333"/>
    <circle cx="240" cy="200" r="2" fill="#333"/>
    <!-- LED indicator -->
    <circle cx="240" cy="175" r="3" fill="#22c55e" opacity="0.7">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="1s" repeatCount="indefinite"/>
    </circle>
    <!-- Mount -->
    <rect x="175" y="240" width="50" height="15" rx="3" fill="#1a1a2e" stroke="#333" stroke-width="1"/>
  </g>
  <!-- Focus rings -->
  <circle cx="200" cy="200" r="38" fill="none" stroke="#06b6d4" stroke-width="0.5" opacity="0.2">
    <animate attributeName="r" values="35;42;35" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.05;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <!-- Floating particles -->
  <circle cx="110" cy="140" r="2" fill="#06b6d4" opacity="0.4">
    <animate attributeName="cy" values="140;128;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="290" cy="170" r="1.5" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="170;155;170" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>