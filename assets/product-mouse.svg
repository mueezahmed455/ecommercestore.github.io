<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bgMouse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="cyanMouse" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00d4ff"/>
      <stop offset="100%" style="stop-color:#3b82f6"/>
    </linearGradient>
    <linearGradient id="bodyMouse" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#2a2a3e"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <filter id="glowMouse">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadowMouse" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#00d4ff;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#00d4ff;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bgMouse)" rx="16"/>
  <ellipse cx="200" cy="310" rx="70" ry="12" fill="url(#shadowMouse)"/>
  <!-- Mouse body -->
  <g filter="url(#glowMouse)">
    <!-- Main body shape -->
    <path d="M155 180 Q150 140 170 120 Q185 105 200 105 Q215 105 230 120 Q250 140 245 180 L250 250 Q250 270 230 275 L170 275 Q150 270 150 250 Z" fill="url(#bodyMouse)" stroke="url(#cyanMouse)" stroke-width="2"/>
    <!-- Center divider line -->
    <line x1="200" y1="105" x2="200" y2="190" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Left button -->
    <path d="M155 180 Q150 140 170 120 Q185 108 200 108 L200 188 Q180 186 155 180 Z" fill="#22223a" opacity="0.5"/>
    <!-- Right button -->
    <path d="M245 180 Q250 140 230 120 Q215 108 200 108 L200 188 Q220 186 245 180 Z" fill="#22223a" opacity="0.5"/>
    <!-- Scroll wheel -->
    <rect x="194" y="140" width="12" height="24" rx="6" fill="#1a1a2e" stroke="#00d4ff" stroke-width="1.5">
      <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite"/>
    </rect>
    <!-- Scroll wheel lines -->
    <line x1="196" y1="146" x2="204" y2="146" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="196" y1="152" x2="204" y2="152" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <line x1="196" y1="158" x2="204" y2="158" stroke="#00d4ff" stroke-width="0.8" opacity="0.6"/>
    <!-- RGB LED strip along bottom edge -->
    <path d="M165 268 Q175 275 200 276 Q225 275 235 268" fill="none" stroke="#00d4ff" stroke-width="2" opacity="0.8">
      <animate attributeName="opacity" values="0.5;1;0.5" dur="1.5s" repeatCount="indefinite"/>
    </path>
    <!-- Side grip lines -->
    <line x1="152" y1="210" x2="158" y2="210" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <line x1="150" y1="220" x2="158" y2="220" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <line x1="151" y1="230" x2="158" y2="230" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <line x1="242" y1="210" x2="248" y2="210" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <line x1="242" y1="220" x2="250" y2="220" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <line x1="242" y1="230" x2="249" y2="230" stroke="#555" stroke-width="1" stroke-linecap="round"/>
    <!-- LED dots on sides -->
    <circle cx="153" cy="195" r="2" fill="#00d4ff" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite"/>
    </circle>
    <circle cx="247" cy="195" r="2" fill="#00d4ff" opacity="0.7">
      <animate attributeName="opacity" values="0.3;0.9;0.3" dur="2s" repeatCount="indefinite" begin="0.5s"/>
    </circle>
  </g>
  <!-- Floating particles -->
  <circle cx="110" cy="140" r="2" fill="#00d4ff" opacity="0.4">
    <animate attributeName="cy" values="140;125;140" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="295" cy="170" r="1.5" fill="#3b82f6" opacity="0.3">
    <animate attributeName="cy" values="170;155;170" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="150" cy="100" r="1" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="100;88;100" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>
