<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="gold2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#ec4899"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow2" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#f59e0b;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg2)" rx="16"/>
  <ellipse cx="200" cy="310" rx="60" ry="15" fill="url(#shadow2)"/>
  <!-- Watch band top -->
  <path d="M185 120 Q180 160 175 200 L225 200 Q220 160 215 120 Z" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
  <!-- Watch band bottom -->
  <path d="M175 240 L170 300 Q170 310 180 310 L220 310 Q230 310 230 300 L225 240 Z" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
  <!-- Watch face -->
  <g filter="url(#glow2)">
    <circle cx="200" cy="220" r="45" fill="#1a1a2e" stroke="url(#gold2)" stroke-width="2.5"/>
    <circle cx="200" cy="220" r="40" fill="#0f0f1a"/>
    <!-- Watch hands -->
    <line x1="200" y1="220" x2="200" y2="195" stroke="#f59e0b" stroke-width="2" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="60s" repeatCount="indefinite"/>
    </line>
    <line x1="200" y1="220" x2="215" y2="210" stroke="#ec4899" stroke-width="1.5" stroke-linecap="round">
      <animateTransform attributeName="transform" type="rotate" from="0 200 220" to="360 200 220" dur="3600s" repeatCount="indefinite"/>
    </line>
    <circle cx="200" cy="220" r="3" fill="#f59e0b"/>
    <!-- Hour markers -->
    <circle cx="200" cy="185" r="1.5" fill="#666"/>
    <circle cx="235" cy="220" r="1.5" fill="#666"/>
    <circle cx="200" cy="255" r="1.5" fill="#666"/>
    <circle cx="165" cy="220" r="1.5" fill="#666"/>
  </g>
  <!-- Floating particles -->
  <circle cx="130" cy="150" r="2" fill="#f59e0b" opacity="0.4">
    <animate attributeName="cy" values="150;138;150" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="270" cy="180" r="1.5" fill="#ec4899" opacity="0.3">
    <animate attributeName="cy" values="180;165;180" dur="2.8s" repeatCount="indefinite"/>
  </circle>
</svg>