<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="orange6" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f97316"/>
      <stop offset="100%" style="stop-color:#f59e0b"/>
    </linearGradient>
    <filter id="glow6">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow6" cx="50%" cy="78%">
      <stop offset="0%" style="stop-color:#f97316;stop-opacity:0.25"/>
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg6)" rx="16"/>
  <ellipse cx="200" cy="310" rx="45" ry="10" fill="url(#shadow6)"/>
  <!-- Power bank body -->
  <g filter="url(#glow6)">
    <rect x="140" y="140" width="120" height="160" rx="16" fill="#1e1e2e" stroke="url(#orange6)" stroke-width="2"/>
    <!-- Battery indicator -->
    <rect x="155" y="160" width="90" height="8" rx="4" fill="#2a2a3e"/>
    <rect x="155" y="160" width="67" height="8" rx="4" fill="url(#orange6)">
      <animate attributeName="width" values="67;72;67" dur="4s" repeatCount="indefinite"/>
    </rect>
    <!-- LED indicators -->
    <circle cx="175" cy="190" r="5" fill="#22c55e" opacity="0.8"/>
    <circle cx="200" cy="190" r="5" fill="#22c55e" opacity="0.8"/>
    <circle cx="225" cy="190" r="5" fill="#22c55e" opacity="0.8"/>
    <circle cx="200" cy="190" r="5" fill="#22c55e" opacity="0.6">
      <animate attributeName="opacity" values="0.4;0.9;0.4" dur="2s" repeatCount="indefinite"/>
    </circle>
    <!-- USB-C port -->
    <rect x="180" y="280" width="40" height="12" rx="6" fill="#2a2a3e" stroke="#444" stroke-width="1"/>
    <!-- Power button -->
    <circle cx="200" cy="230" r="12" fill="#2a2a3e" stroke="#555" stroke-width="1"/>
    <circle cx="200" cy="230" r="4" fill="#f97316" opacity="0.7">
      <animate attributeName="opacity" values="0.5;0.9;0.5" dur="1.5s" repeatCount="indefinite"/>
    </circle>
  </g>
  <!-- Lightning bolt -->
  <path d="M210 140 L195 175 L210 175 L195 200" fill="none" stroke="#f97316" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" opacity="0.6">
    <animate attributeName="opacity" values="0.3;0.8;0.3" dur="2s" repeatCount="indefinite"/>
  </path>
  <!-- Floating particles -->
  <circle cx="110" cy="160" r="2" fill="#f97316" opacity="0.4">
    <animate attributeName="cy" values="160;148;160" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="300" cy="200" r="1.5" fill="#f59e0b" opacity="0.3">
    <animate attributeName="cy" values="200;185;200" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>