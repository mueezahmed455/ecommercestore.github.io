<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <linearGradient id="bg5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f0f1a"/>
      <stop offset="100%" style="stop-color:#1a1a2e"/>
    </linearGradient>
    <linearGradient id="green5" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#22c55e"/>
      <stop offset="100%" style="stop-color:#00d4ff"/>
    </linearGradient>
    <filter id="glow5">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <radialGradient id="shadow5" cx="50%" cy="75%">
      <stop offset="0%" style="stop-color:#22c55e;stop-opacity:0.2"/>
      <stop offset="100%" style="stop-color:#22c55e;stop-opacity:0"/>
    </radialGradient>
  </defs>
  <rect width="400" height="400" fill="url(#bg5)" rx="16"/>
  <ellipse cx="200" cy="300" rx="100" ry="12" fill="url(#shadow5)"/>
  <!-- Keyboard body -->
  <g filter="url(#glow5)">
    <rect x="80" y="170" width="240" height="100" rx="10" fill="#1a1a2e" stroke="url(#green5)" stroke-width="1.5"/>
    <!-- Key rows -->
    <!-- Row 1 -->
    <rect x="95" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5">
      <animate attributeName="fill" values="#2a2a3e;#22c55e33;#2a2a3e" dur="3s" repeatCount="indefinite"/>
    </rect>
    <rect x="117" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="139" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="161" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="183" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="205" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="227" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="249" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="271" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="293" y="180" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <!-- Row 2 -->
    <rect x="95" y="198" width="22" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="121" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5">
      <animate attributeName="fill" values="#2a2a3e;#00d4ff33;#2a2a3e" dur="2.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="143" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="165" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="187" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="209" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="231" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="253" y="198" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="275" y="198" width="32" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <!-- Row 3 -->
    <rect x="95" y="216" width="28" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="127" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="149" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5">
      <animate attributeName="fill" values="#2a2a3e;#22c55e33;#2a2a3e" dur="3.5s" repeatCount="indefinite"/>
    </rect>
    <rect x="171" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="193" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="215" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="237" y="216" width="18" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="259" y="216" width="50" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <!-- Row 4 - spacebar -->
    <rect x="95" y="234" width="22" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="121" y="234" width="22" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="147" y="234" width="110" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="261" y="234" width="22" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
    <rect x="287" y="234" width="22" height="14" rx="3" fill="#2a2a3e" stroke="#444" stroke-width="0.5"/>
  </g>
  <!-- Floating particles -->
  <circle cx="100" cy="130" r="2" fill="#22c55e" opacity="0.4">
    <animate attributeName="cy" values="130;118;130" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="310" cy="150" r="1.5" fill="#00d4ff" opacity="0.3">
    <animate attributeName="cy" values="150;135;150" dur="2.5s" repeatCount="indefinite"/>
  </circle>
</svg>